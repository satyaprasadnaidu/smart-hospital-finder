<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Hospital Finder - Find the right hospital for your symptoms instantly.">

    <title>Smart Hospital Finder</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Project Title -->
        <h1>Smart Hospital Finder 🏥</h1>

        <!-- Search Section -->
        <div class="search-box">

            <input
                type="text"
                id="symptomInput"
                placeholder="Enter your symptom (e.g. fever, headache)">

            <button id="searchBtn" onclick="searchSymptom()">
                Search
            </button>

        </div>

        <!-- Location Section -->
        <div class="location-section">

            <button id="locationBtn" onclick="getUserLocation()">
                📍 Get My Location
            </button>

            <div id="locationCard" class="location-card hidden">

                <h3>📍 Your Location</h3>

                <p>
                    Latitude:
                    <span id="latitudeVal">-</span>
                </p>

                <p>
                    Longitude:
                    <span id="longitudeVal">-</span>
                </p>

            </div>

            <div id="locationError" class="location-error"></div>

        </div>

        <!-- Map Section -->
        <div class="map-section" id="mapSection">

            <h3 class="map-heading">
                📍 Your Location on Map
            </h3>

            <div id="map"></div>

        </div>

        <!-- Results Section -->
        <div id="result" class="result-section"></div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Project JS -->
    <script src="script.js"></script>

</body>

</html>
